services:
  db:
    image: postgres:15-alpine
    container_name: challenge-db-dev
    restart: always
    env_file: .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5454:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

  api:
    build:
      context: .
      target: deps
    container_name: challenge-api-dev
    restart: always
    working_dir: /app
    command: sh -c "npx prisma generate && npm run dev"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=${PORT}
    ports:
      - "3001:${PORT}"
    volumes:
      - ./:/app
      - node_modules_dev:/app/node_modules

volumes:
  postgres_data_dev:
  node_modules_dev:
